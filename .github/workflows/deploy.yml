name: Carmen Sandiego CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build
        env:
          CI: false # Prevents warnings from being treated as errors during build

      - name: Validate Backend Syntax
        run: node --check server_remote_fix.js

  deploy-dev:
    needs: build-and-lint
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Development VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            mkdir -p /opt/carmen-game/dev
            cd /opt/carmen-game/dev

            # Setup Git if not exists
            if [ ! -d .git ]; then
              git clone -b develop https://github.com/Kamifaria/Carmen-Sandiego-Game.git .
            else
              git checkout develop
              git pull origin develop
            fi

            # Create .env for Dev
            echo "APP_PORT=8082" > .env
            echo "DB_USER=postgres" >> .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "DB_NAME=postgres" >> .env

            # Docker Orchestration
            docker compose down
            docker compose up -d --build

            # Health Check
            sleep 10
            curl -f http://localhost:8082 || (docker compose logs && exit 1)

  deploy-prod:
    needs: build-and-lint
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Production VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            mkdir -p /opt/carmen-game/prod
            cd /opt/carmen-game/prod

            # Setup Git if not exists
            if [ ! -d .git ]; then
              git clone -b main https://github.com/Kamifaria/Carmen-Sandiego-Game.git .
            else
              git checkout main
              git pull origin main
            fi

            # Create .env for Prod
            echo "APP_PORT=8081" > .env
            echo "DB_USER=postgres" >> .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "DB_NAME=postgres" >> .env

            # Docker Orchestration
            docker compose down
            docker compose up -d --build

            # Health Check
            sleep 10
            curl -f http://localhost:8081 || (docker compose logs && exit 1)
